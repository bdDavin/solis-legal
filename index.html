<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Solis: Sun Tracker</title>
<meta name="description" content="Solis traces the sun's arc through any place on Earth, on any date, live in AR over your real sky.">
<style>
  :root {
    color-scheme: light dark;
    --bg: #faf5ec;
    --fg: #1a1c20;
    --muted: rgba(26, 28, 32, 0.6);
    --accent: #f59e0b;
    --rule: rgba(26, 28, 32, 0.12);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b101d;
      --fg: #ffffff;
      --muted: rgba(255, 255, 255, 0.7);
      --rule: rgba(255, 255, 255, 0.15);
    }
  }
  * { box-sizing: border-box; }
  html { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
  }
  main {
    max-width: 480px;
    text-align: center;
  }
  .icon {
    width: 128px;
    height: 128px;
    margin: 0 auto 24px;
    display: block;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    border-radius: 28.6px;
  }
  h1 {
    font-size: 2.25rem;
    font-weight: 700;
    margin: 0 0 8px;
    letter-spacing: -0.02em;
  }
  .tagline {
    color: var(--muted);
    font-size: 1.125rem;
    margin: 0 0 32px;
    line-height: 1.45;
  }
  .links {
    border-top: 1px solid var(--rule);
    padding-top: 24px;
    font-size: 0.95rem;
  }
  .links a {
    color: var(--accent);
    text-decoration: none;
    margin: 0 12px;
  }
  .links a:hover { text-decoration: underline; }
  .contact {
    margin-top: 32px;
    color: var(--muted);
    font-size: 0.9rem;
  }
  .contact a { color: var(--accent); text-decoration: none; }
  .contact a:hover { text-decoration: underline; }
</style>
</head>
<body>
<main>
  <img src="icon.png" alt="Solis app icon" class="icon" width="128" height="128">
  <h1>Solis</h1>
  <p class="tagline">Trace the sun's arc through any place on Earth, on any date, live in AR over your real sky.</p>

  <nav class="links">
    <a href="privacy.html">Privacy</a>
    <a href="terms.html">Terms</a>
  </nav>

  <p class="contact">
    Questions or feedback: <a href="mailto:hello@trysolis.app">hello@trysolis.app</a>
  </p>
</main>
</body>
</html>
